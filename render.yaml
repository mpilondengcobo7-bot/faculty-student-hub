databases:
  - name: dut-project-hub-db
    plan: free
    databaseName: dut_project_hub
    user: dut_admin

services:
  - type: web
    name: dut-project-hub
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT "app:create_app()"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dut-project-hub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
