{% extends 'base.html' %}
{% block title %}Login – DUT Project Hub{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-7 col-lg-5">
        <div class="auth-card fade-up">
          <div class="auth-card-header">
            <div class="brand-icon mx-auto mb-3" style="width:52px;height:52px;font-size:1.4rem;">
              <i class="bi bi-diagram-3-fill"></i>
            </div>
            <h4 class="text-white fw-bold mb-1">Welcome back</h4>
            <p class="mb-0" style="color:rgba(255,255,255,.6);font-size:.85rem">Sign in to DUT Project Hub</p>
          </div>
          <div class="auth-card-body">

            <!-- Microsoft SSO -->
            <a href="{{ url_for('auth.microsoft_login') }}" class="btn btn-microsoft mb-2">
              <svg width="18" height="18" viewBox="0 0 21 21" class="me-2" style="vertical-align:middle">
                <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                <rect x="11" y="1" width="9" height="9" fill="#00a4ef"/>
                <rect x="1" y="11" width="9" height="9" fill="#7fba00"/>
                <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
              </svg>
              Continue with Microsoft (DUT)
            </a>

            <div class="divider-or">or sign in with email</div>

            <form method="post">
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-envelope text-muted"></i>
                  </span>
                  <input type="email" name="email" class="form-control border-start-0" placeholder="you@dut.ac.za" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-lock text-muted"></i>
                  </span>
                  <input type="password" name="password" id="passInput" class="form-control border-start-0 border-end-0" placeholder="••••••••" required>
                  <button class="input-group-text bg-white" type="button" id="togglePass" style="cursor:pointer;border-left:0">
                    <i class="bi bi-eye text-muted" id="eyeIcon"></i>
                  </button>
                </div>
              </div>
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check mb-0">
                  <input class="form-check-input" type="checkbox" name="remember" id="rememberMe">
                  <label class="form-check-label small" for="rememberMe">Remember me</label>
                </div>
              </div>
              <button type="submit" class="btn btn-navy w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
              </button>
            </form>

            <p class="text-center mt-4 mb-0 small text-muted">
              Don't have an account?
              <a href="{{ url_for('auth.register') }}" class="fw-semibold text-decoration-none" style="color:var(--accent)">Register here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('togglePass').addEventListener('click', function() {
  const p = document.getElementById('passInput');
  const icon = document.getElementById('eyeIcon');
  if (p.type === 'password') {
    p.type = 'text';
    icon.className = 'bi bi-eye-slash text-muted';
  } else {
    p.type = 'password';
    icon.className = 'bi bi-eye text-muted';
  }
});
</script>
{% endblock %}
